name: Build Gorakh Chat APK (Cloud Only)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_apk:
    name: Build APK directly from Repo
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Logic Files
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install @morrowdigital/watermelondb-expo-plugin
          npm install

      - name: Generating Native Android Folders
        run: npx expo prebuild --platform android --clean

      - name: Patch Native Build Collisions
        run: |
          echo "Patching build.gradle to ignore duplicate C++ bridges..."
          sed -i -e '/android {/a \
              packagingOptions { \
                  pickFirst "lib/x86/libc++_shared.so" \
                  pickFirst "lib/x86_64/libc++_shared.so" \
                  pickFirst "lib/armeabi-v7a/libc++_shared.so" \
                  pickFirst "lib/arm64-v8a/libc++_shared.so" \
              }' android/app/build.gradle

      - name: Compile APK via Android Gradle
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -Dorg.gradle.jvmargs="-Xmx3g" --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: GorakhChat-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
