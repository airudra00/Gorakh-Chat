name: Build Gorakh Chat APK (Cloud Only)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_apk:
    name: Build APK directly from Repo
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Logic Files
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install @morrowdigital/watermelondb-expo-plugin
          npm install

      - name: Generating Native Android Folders
        run: npx expo prebuild --platform android --clean

      - name: Compile APK via Android Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: GorakhChat-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
