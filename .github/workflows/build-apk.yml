name: Build Gorakh Chat APK (Cloud Only)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_apk:
    name: Build APK from scratch without Local Node
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Logic Files
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Scaffold React Native App in Cloud
        run: |
          echo "Initializing fresh Expo app in Cloud Server..."
          npx -y create-expo-app@latest CloudApp --template blank-typescript
          
          echo "Merging our Custom Logic (Mesh, E2EE, Radar UI)..."
          cp -r src CloudApp/
          cp -f App.tsx CloudApp/
          
          cd CloudApp
          
          echo "Installing Dependencies (WatermelonDB, TweetNaCl)..."
          npm install react-native-reanimated tweetnacl tweetnacl-util @nozbe/watermelondb react-native-permissions lottie-react-native
          
          echo "Generating Native Android Folders..."
          npx expo prebuild --platform android --clean

      - name: Compile APK via Android Gradle
        run: |
          cd CloudApp/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: GorakhChat-APK
          path: CloudApp/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
